<html>
    <head>
        <title>Text Input Control</title>
    </head>
    <body>
        <h1>User Form</h1>
        <form>
            <label>FirstName :</label>
            <input type="text" name="firstname" value="uma" size="50"><br><br>
            <label>LastName :</label>
            <input type="text" name="lastname" value="Mahesh" size="50"><br><br>
            <label>Pasword :</label>
            <input type="password" name="password" value="password" size="50"><br><br>
            <!-- Multiline Input Control -->
             <label>Description :</label>
<textarea name="description" rows="5" col="50">This is text area input control
    </textarea>
        </form>
    </body>
</html>
