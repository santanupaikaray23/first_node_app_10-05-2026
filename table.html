<html>
    <head>
        <title>Table Tag</title>
        <style>
            table, tr, th, td {
                 border: 1px solid black;
                 border-collapse: collapse;
                
            }
            th, td {
                padding: 15px;
            }
            th {
                text-align: center;
            }
        </style>
    </head>
    <body>
<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>City</th>
              <th>Country</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>Santanu</td>
            <td>Bhubaneswar</td>
            <td>Odisha</td>
        </tr>
          <tr>
            <td>Sipun</td>
            <td>Kolkata</td>
            <td>West Bengal</td>
        </tr>
    </tbody>
</table>

    </body>
</html>
