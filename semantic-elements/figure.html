<html>
    <head>
        <title>Figure Element</title>
    </head>
    <style>
        figure {
            border: thin #c0c0c0 solid;
            display: flex;
            flex-flow: column;
            padding: 5px;
            max-width: 220px;
        }

        img {
            max-width: 220px;
            max-height: 150px;
        }

        figcaption {
            background-color: #222;
            color: #FFF;
            font: italic;
            padding: 3px;
            text-align: center;
        }
    </style>
    <body>
<figure>
    <img src="/images/png-transparent-motorcycle-transportation-bike-blue-travel-scooter-moped.png" alt="Motercycle image">
    <figcaption>Moter Cycle</figcaption>
</figure>
    </body>
</html>
